<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>QRgen v1</title>
</head>
<body>
  <h1>QR Generator <span class="version-badge">v1</span></h1>
  <div class="form">
      <label>
        <textarea maxlength="2000" placeholder="Enter URL/text,..." spellcheck="false"></textarea>
      </label>
      <div class="character-counter">
        <span class="current-character-counter">0</span>/<span class="character-max-count"></span>
      </div>
      <div class="color-inputs">
        <p>
            <label>Color</label>
            <hex-color-picker id="colorPicker color" class="color-picker">class="color-picker"></hex-color-picker>
        </p>
        <div style="width: 5%;"></div>
        <p>
            <label>Background</label>
            <hex-color-picker id="colorPicker backgroundColor" class="color-picker"></hex-color-picker
        </p>
    </div>
    <p>
        <label for="size">Image size (px)</label>
        <input id="size" type="text" placeholder="Size" value="250">
    </p>
      <button type="button" class="generateBtn">Generate</button>
  </div>
  <div class="qr-code">
    <div class="border">
      <div class="scancontainer">
        <img src="" alt="QR code load failed.">
      </div>
    </div>
  </div>
  <div class="footer">
      <span class="download-link">Download</span>
      <span class="error-message"></span>
      <span class="contrast-warning-message"></span>
      <span class="connection-error-message"></span>
      <span class="reset-link">Reset settings</span>
  </div>
  <script src="popup.js"></script>
  <script type="module" src="https://esm.sh/vanilla-colorful"></script>
</body>
</html>
