name: Stylelint

on:
  push:
    branches: [main]
    paths:
    - '**/*.css'
  pull_request:
    branches: [main]
    paths:
      - '**/*.css'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Stylelint Order plugin
        run: npm install stylelint-order --no-save

      - name: Run Stylelint
        run: npx stylelint "**/*.css"
