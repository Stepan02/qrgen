name: Cypress

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.js'
      - '**/*.html'
      - '**/*.htm'
      - '**/*.css'
      - 'demo/**'
      - 'extension/**'
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.html'
      - '**/*.htm'
      - '**/*.css'
      - 'demo/**'
      - 'extension/**'

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      demo: ${{ steps.filter.outputs.demo }}
      extension: ${{ steps.filter.outputs.extension }}

    steps:
      - uses: actions/checkout@v3

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            demo:
              - 'demo/**'
              - '*.html'
              - '*.htm'
            extension:
              - 'extension/**'
  cypress-tests-demo:
    name: "Cypress tests for demo"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.demo == 'true'

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - uses: cypress-io/github-action@v6
        with:
          start: npx serve . -l 5500
          wait-on: http://localhost:5500
          spec: 'tests/e2e/demo.spec.js'

  cypress-tests-extension:
    name: "Cypress tests for extension"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.extension == 'true'

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - uses: cypress-io/github-action@v6
        with:
          start: npx serve . -l 5500
          wait-on: http://localhost:5500
          spec: 'tests/e2e/extension.spec.js'
